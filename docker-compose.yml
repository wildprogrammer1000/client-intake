services:
  postgres:
    image: postgres:16-alpine
    container_name: inquiry-postgres
    environment:
      POSTGRES_DB: client_intake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - client_intake_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_intake"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: inquiry-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/client_intake?schema=public
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-inquiries}
      AWS_CLOUDFRONT_URL: ${AWS_CLOUDFRONT_URL:-}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-replace-with-strong-secret}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

volumes:
  client_intake_data:
