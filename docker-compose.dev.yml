services:
  postgres:
    image: postgres:16-alpine
    container_name: client-intake-postgres-dev
    environment:
      POSTGRES_DB: client_intake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d client_intake"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
