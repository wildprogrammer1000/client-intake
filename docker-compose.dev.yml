services:
  postgres:
    image: postgres:16-alpine
    container_name: inquiry-postgres-dev
    environment:
      POSTGRES_DB: inquiry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inquiry"]
      interval: 5s
      start_period: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_dev_data:
